<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="A local-first notebook with spaced-repetition memory. Your vault never leaves this device." />
    <title>Noto — notes that stay</title>
    <script>
      // Paint the correct paper/ink background before React mounts — no white
      // flash when the installed app launches (reads the persisted theme).
      try {
        var st = (JSON.parse(localStorage.getItem('noto-ui') || '{}').state) || {}
        document.documentElement.style.backgroundColor = st.dark ? '#14110c' : '#f4f1e9'
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
